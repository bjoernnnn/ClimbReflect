name: ClimbReflect
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""        # ggf. deine Team-ID eintragen für Gerät-Builds

targets:
  ClimbReflect:
    type: application
    platform: iOS
    sources:
      - ClimbReflect
    info:
      path: ClimbReflect/Info.plist
      properties:
        CFBundleDisplayName: ClimbReflect
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Für den optionalen Redpoint-Import aus Apple Health:
        NSHealthShareUsageDescription: "ClimbReflect liest deine Klettersessions aus Apple Health (z. B. von Redpoint), um deinen Fortschritt anzuzeigen."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ClimbReflect
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"   # iPhone
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
